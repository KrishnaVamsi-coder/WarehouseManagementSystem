<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Inventory Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    .low-stock {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Live Inventory Dashboard</h1>
  <table id="inventoryTable">
    <thead>
      <tr>
        <th>Item Name</th>
        <th>SKU</th>
        <th>Stock Level</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <script>
    const inventory = [
      { name: "Widget A", sku: "WID-A-01", stock: 120 },
      { name: "Widget B", sku: "WID-B-02", stock: 15 },
      { name: "Gadget C", sku: "GAD-C-07", stock: 0 },
      { name: "Gizmo D", sku: "GIZ-D-05", stock: 65 },
    ];

    const lowStockThreshold = 20;

    function renderInventoryTable() {
      const tbody = document.querySelector("#inventoryTable tbody");
      tbody.innerHTML = ""; 

      inventory.forEach(item => {
        const tr = document.createElement("tr");

        const nameTd = document.createElement("td");
        nameTd.textContent = item.name;
        tr.appendChild(nameTd);

        const skuTd = document.createElement("td");
        skuTd.textContent = item.sku;
        tr.appendChild(skuTd);

        const stockTd = document.createElement("td");
        stockTd.textContent = item.stock;
        tr.appendChild(stockTd);
        const statusTd = document.createElement("td");
        if(item.stock === 0) {
          statusTd.textContent = "Out of Stock";
          statusTd.classList.add("low-stock");
        } else if (item.stock <= lowStockThreshold) {
          statusTd.textContent = "Low Stock";
          statusTd.classList.add("low-stock");
        } else {
          statusTd.textContent = "In Stock";
        }
        tr.appendChild(statusTd);

        tbody.appendChild(tr);
      });
    }
    renderInventoryTable();
  </script>
</body>
</html>
